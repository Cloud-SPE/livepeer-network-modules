# Compose stack: vLLM OpenAI-compatible backend + capability-broker +
# payment-daemon receiver.
#
# This is the broker-side LAN bring-up shape:
# - vLLM serves the OpenAI-compatible `/v1/chat/completions` API
# - capability-broker exposes a paid `http-stream@v0` capability
# - payment-daemon receiver exposes the unix socket the broker dials
#
# Pair with:
#   capability-broker/examples/host-config.vllm-chat.example.yaml
#
# Before use:
# 1. Copy the host-config example and set `payment_daemon.mock: false`
#    plus `payment_daemon.socket: /var/run/livepeer/payment-daemon.sock`.
# 2. Provide a hot-wallet keystore JSON and password file for payment-daemon.
# 3. Set `ORCH_ADDRESS` to the cold / on-chain orch identity authorized to use
#    that hot signer.
# 4. Provide CHAIN_RPC if you want the receiver container to boot with its
#    production-shaped flag surface. The daemon remains chain-stubbed per the
#    current repo status; do not use real funds yet.
#
# Bring-up:
#   cp capability-broker/examples/host-config.vllm-chat.example.yaml ./host-config.yaml
#   export HF_TOKEN=...
#   export ORCH_ADDRESS=0x...   # cold/on-chain orch identity
#   export CHAIN_RPC=...
#   docker compose -f capability-broker/compose/docker-compose.vllm-chat-with-payment.yml up -d

services:
  vllm_model_runner:
    image: vllm/vllm-openai:cu130-nightly
    container_name: vllm_model_runner
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - huggingface-model-cache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN}
    ipc: host
    command: >
      --host 0.0.0.0
      --port 8000
      --pipeline-parallel-size 1
      --tensor-parallel-size 1
      --attention-backend flashinfer
      --enable-prefix-caching
      --model sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
      --served-model-name Qwen3.6-27B
      --kv-cache-dtype fp8_e4m3
      --gpu-memory-utilization 0.95
      --max-num-seqs 10
      --max-num-batched-tokens 4096
      --max-model-len 196608
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
      --async-scheduling
      --enable-chunked-prefill
      --default-chat-template-kwargs '{"preserve_thinking":true}'
      --trust-remote-code
      --quantization modelopt
      --language-model-only
      --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
      --no-scheduler-reserve-full-isl
    restart: unless-stopped

  payment-daemon-receiver:
    image: ${REGISTRY:-tztcloud}/livepeer-payment-daemon:${PAYMENT_TAG:-v1.0.0}
    container_name: payment_daemon_receiver
    command:
      - --mode=receiver
      - --socket=/var/run/livepeer/payment-daemon.sock
      - --db=/var/lib/livepeer/payment-daemon/sessions.db
      - --chain-rpc=${CHAIN_RPC:-}
      - --keystore-path=/etc/livepeer/keystore.json
      - --keystore-password-file=/etc/livepeer/keystore-password
      - --orch-address=${ORCH_ADDRESS:?set ORCH_ADDRESS to the cold/on-chain orch identity}
      - --gas-price-multiplier-pct=${GAS_PRICE_MULT_PCT:-200}
      - --redeem-gas=${REDEEM_GAS:-500000}
    environment:
      LIVEPEER_KEYSTORE_PASSWORD: ${LIVEPEER_KEYSTORE_PASSWORD:-}
    volumes:
      - ${PAYMENT_KEYSTORE:-./run/hot-wallet-keystore.json}:/etc/livepeer/keystore.json:ro
      - ${PAYMENT_KEYSTORE_PASSWORD_FILE:-./run/keystore-password}:/etc/livepeer/keystore-password:ro
      - livepeer-run:/var/run/livepeer
      - payment-daemon-db:/var/lib/livepeer/payment-daemon
    restart: unless-stopped

  capability-broker:
    image: ${REGISTRY:-tztcloud}/livepeer-capability-broker:${BROKER_TAG:-v1.0.0}
    container_name: capability_broker
    depends_on:
      - vllm_model_runner
      - payment-daemon-receiver
    command:
      - --config=/etc/livepeer/host-config.yaml
      - --listen=:8080
      - --metrics=:9090
    environment:
      LOG_LEVEL: ${BROKER_LOG_LEVEL:-info}
    volumes:
      - ${BROKER_CONFIG:-./host-config.yaml}:/etc/livepeer/host-config.yaml:ro
      - livepeer-run:/var/run/livepeer
    ports:
      - "${BROKER_LISTEN_PORT:-8080}:8080"
      - "${BROKER_METRICS_PORT:-9090}:9090"
    restart: unless-stopped

volumes:
  huggingface-model-cache:
    external: true
  livepeer-run: {}
  payment-daemon-db: {}

networks:
  default:
    name: ingress
    external: true
