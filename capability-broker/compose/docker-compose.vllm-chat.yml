# Compose stack: vLLM OpenAI-compatible backend + capability-broker exposing
# a single chat-completions capability.
#
# Bring-up:
#   cp capability-broker/examples/host-config.vllm-chat.example.yaml ./host-config.yaml
#   export HF_TOKEN=...
#   docker compose -f capability-broker/compose/docker-compose.vllm-chat.yml up -d
#
# Notes:
# - The broker host-config uses `payment_daemon.mock: true` so this stack can
#   come up without a payment-daemon container.
# - The broker exposes only its paid and metrics listeners. vLLM stays internal
#   to the compose network unless you uncomment the host port mapping.

services:
  vllm_model_runner:
    image: vllm/vllm-openai:cu130-nightly
    container_name: vllm_model_runner
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - huggingface-model-cache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN}
    ipc: host
    command: >
      --host 0.0.0.0
      --port 8000
      --pipeline-parallel-size 1
      --tensor-parallel-size 1
      --attention-backend flashinfer
      --enable-prefix-caching
      --model sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
      --served-model-name Qwen3.6-27B
      --kv-cache-dtype fp8_e4m3
      --gpu-memory-utilization 0.95
      --max-num-seqs 10
      --max-num-batched-tokens 4096
      --max-model-len 196608
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
      --async-scheduling
      --enable-chunked-prefill
      --default-chat-template-kwargs '{"preserve_thinking":true}'
      --trust-remote-code
      --quantization modelopt
      --language-model-only
      --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
      --no-scheduler-reserve-full-isl
    # Uncomment for direct host debugging of the raw vLLM API.
    # ports:
    #   - "8000:8000"
    restart: unless-stopped

  capability-broker:
    image: ${REGISTRY:-tztcloud}/livepeer-capability-broker:${TAG:-v1.0.0}
    container_name: capability_broker
    depends_on:
      - vllm_model_runner
    command:
      - --config=/etc/livepeer/host-config.yaml
      - --listen=:8080
      - --metrics=:9090
    environment:
      LOG_LEVEL: ${BROKER_LOG_LEVEL:-info}
    volumes:
      - ${BROKER_CONFIG:-./host-config.yaml}:/etc/livepeer/host-config.yaml:ro
    ports:
      - "${BROKER_LISTEN_PORT:-8080}:8080"
      - "${BROKER_METRICS_PORT:-9090}:9090"
    restart: unless-stopped

volumes:
  huggingface-model-cache:
    external: true

networks:
  default:
    name: ingress
    external: true
