# Run-only compose for capability-broker. Build via
# `./infra/scripts/build-images.sh capability-broker`.
#
# Three listeners, all configurable via env: paid (8080), metrics (9090),
# RTMP ingest (1935; opt-in via the rtmp profile).
#
# Boot expects:
#   - host-config.yaml mounted at /etc/livepeer/host-config.yaml
#     (template at capability-broker/examples/host-config.example.yaml)
#   - payment-daemon UDS at /var/run/livepeer/payment-daemon.sock
#     (mounted from the host or a sibling container; or set
#     `payment_daemon.mock: true` in host-config.yaml for smoke usage)

services:
  capability-broker:
    image: ${REGISTRY:-tztcloud}/livepeer-capability-broker:${TAG:-v1.1.0}
    command:
      - --config=/etc/livepeer/host-config.yaml
      - --listen=:8080
      - --metrics=:9090
    environment:
      LOG_LEVEL: ${BROKER_LOG_LEVEL:-info}
    ports:
      - "${BROKER_LISTEN_PORT:-8080}:8080"
      - "${BROKER_METRICS_PORT:-9090}:9090"
    volumes:
      - ${BROKER_CONFIG:-./host-config.yaml}:/etc/livepeer/host-config.yaml:ro
      - ${PAYMENT_DAEMON_SOCKET_DIR:-/var/run/livepeer}:/var/run/livepeer
    restart: unless-stopped

  # Opt-in RTMP listener for rtmp-ingress-hls-egress@v0 mode.
  # Enable with `--profile rtmp`. Maps :1935 + GPU device passthrough.
  capability-broker-rtmp:
    image: ${REGISTRY:-tztcloud}/livepeer-capability-broker:${TAG:-v1.1.0}
    profiles: [rtmp]
    command:
      - --config=/etc/livepeer/host-config.yaml
      - --listen=:8080
      - --metrics=:9090
      - --rtmp-listen-addr=:1935
      - --encoder=${BROKER_ENCODER:-auto}
    environment:
      LOG_LEVEL: ${BROKER_LOG_LEVEL:-info}
    ports:
      - "${BROKER_LISTEN_PORT:-8080}:8080"
      - "${BROKER_METRICS_PORT:-9090}:9090"
      - "${BROKER_RTMP_PORT:-1935}:1935"
    volumes:
      - ${BROKER_CONFIG:-./host-config.yaml}:/etc/livepeer/host-config.yaml:ro
      - ${PAYMENT_DAEMON_SOCKET_DIR:-/var/run/livepeer}:/var/run/livepeer
    runtime: nvidia
    restart: unless-stopped
