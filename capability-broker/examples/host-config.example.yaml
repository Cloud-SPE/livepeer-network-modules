# Example host-config.yaml for the capability broker.
#
# This file is the operator's entire day-to-day surface. Edit, reload, re-publish
# the manifest. Per requirement R5, no Go module written, no binary rebuilt.
#
# v0.1 caveat: only the http-reqresp@v0 mode and the response-jsonpath
# extractor are implemented. The aspirational openai-* + http-stream entries
# below are commented out until plans 0006 (modes) and 0007 (extractors) ship.
# A v0.1 binary will fail-fast at startup if those entries are uncommented.

identity:
  orch_eth_address: 0x1234567890abcdef1234567890abcdef12345678
  label: "broker-a"

listen:
  paid: ":8080"
  metrics: ":9090"

# Path to the co-located payment-daemon socket. v0.1 uses an in-process mock
# client regardless of this field; plan 0005 wires the real gRPC client.
payment_daemon:
  socket: /var/run/livepeer/payment-daemon.sock
  mock: true

capabilities:
  # ---- v0.1-supported: http-reqresp + response-jsonpath ----
  - id: "kibble:doggo-bark-counter:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "barks"
      extractor: { type: "response-jsonpath", path: "$.bark_count" }
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: "http"
      url: "http://localhost:9000/count"
      auth: "none"

  # ---- v0.1-supported: a second response-jsonpath capability ----
  - id: "demo:echo:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "echoes"
      extractor: { type: "response-jsonpath", path: "$.count", default: 1 }
    price:
      amount_wei: "10"
      per_units: 1
    backend:
      transport: "http"
      url: "http://localhost:9001/echo"
      auth: "none"

