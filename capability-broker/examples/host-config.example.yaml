# Example host-config.yaml for the capability broker.
#
# This file is the operator's entire day-to-day surface. Edit, reload, re-publish
# the manifest. Per requirement R5, no Go module written, no binary rebuilt.
#
# This example is intentionally conservative: it starts with simple HTTP
# request/response capabilities and keeps more operationally involved shapes
# (RTMP, long-lived streaming, third-party API resale) commented out until the
# operator is ready to wire the required backend infrastructure.
#
# The current broker binary ships multiple mode drivers and extractors. The
# commented entries below are examples of real supported shapes, not placeholders
# for future plans.

identity:
  orch_eth_address: 0x1234567890abcdef1234567890abcdef12345678
  label: "broker-a"

listen:
  paid: ":8080"
  metrics: ":9090"

# Path to the co-located payment-daemon unix socket. The broker dials this
# at startup and fails fast if the daemon is unreachable.
#
# Set `mock: true` to use the in-process Mock client instead — useful for
# unit tests and the broker's standalone smoke script (no payment-daemon
# container required). The Mock still requires a well-formed
# Livepeer-Payment envelope; only the gRPC + BoltDB plumbing is bypassed.
payment_daemon:
  socket: /var/run/livepeer/payment-daemon.sock
  # mock: true

capabilities:
  # ---- Simple HTTP request/response examples ----
  - id: "kibble:doggo-bark-counter:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "barks"
      extractor: { type: "response-jsonpath", path: "$.bark_count" }
    health:
      probe:
        type: "http-status"
        interval_ms: 5000
        timeout_ms: 1500
        unhealthy_after: 2
        healthy_after: 1
        config:
          url: "http://localhost:9000/healthz"
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: "http"
      url: "http://localhost:9000/count"
      auth: "none"

  # ---- A second request/response example ----
  - id: "demo:echo:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "echoes"
      extractor: { type: "response-jsonpath", path: "$.count", default: 1 }
    health:
      probe:
        type: "http-jsonpath"
        interval_ms: 5000
        timeout_ms: 1500
        unhealthy_after: 2
        healthy_after: 1
        config:
          url: "http://localhost:9001/healthz"
          path: "$.ready"
          equals: "true"
    price:
      amount_wei: "10"
      per_units: 1
    backend:
      transport: "http"
      url: "http://localhost:9001/echo"
      auth: "none"

  # ---- Video VOD ABR (active video-gateway offline path) ----
  # The current video product model routes all offline video work through
  # `video:transcode.abr`, including one-rendition jobs. The gateway talks
  # directly to the runner API when `extra.abr_runner_url` (or one of the
  # other worker URL hints) is present in the published manifest.
  #
  # - id: "video:transcode.abr"
  #   offering_id: "default"
  #   interaction_mode: "http-reqresp@v0"
  #   work_unit:
  #     name: "jobs"
  #     extractor: { type: "request-formula", expression: "1", default: 1 }
  #   price:
  #     amount_wei: "25000000"
  #     per_units: 1
  #   backend:
  #     transport: "http"
  #     url: "http://abr-runner:8080/v1/video/transcode/abr"
  #     auth: "none"
  #   extra:
  #     provider: "abr-runner"
  #     video:
  #       task: "abr-transcode"
  #     abr_runner_url: "http://abr-runner:8080"
  #     # Optional stable fields like video.presets, video.codecs,
  #     # video.packaging, and video.hardware.gpu_vendor may be
  #     # auto-hydrated from GET /v1/video/transcode/abr/presets.
  #   constraints:
  #     tier: "standard"
  #     gpu_vendor: "NVIDIA"

  # ---- Daydream Scope (session-control-external-media) ----
  # Real-time generative-video workload run from the upstream
  # `daydreamlive/scope:main` image (unmodified). The broker proxies the
  # control plane and meters seconds-elapsed; media flows
  # browser ↔ Cloudflare TURN ↔ Scope directly, never through the broker.
  # See plan 0026.
  #
  # Operator prereq: HF_TOKEN env on the Scope container (Cloudflare TURN auth).
  # See `daydream-gateway/docs/operator-runbook.md` for deployment.
  #
  # - id: "daydream:scope:v1"
  #   offering_id: "default"
  #   interaction_mode: "session-control-external-media@v0"
  #   work_unit:
  #     name: "seconds"
  #     extractor: { type: "seconds-elapsed", granularity: 1 }
  #   price:
  #     amount_wei: "1500000"
  #     per_units: 1
  #   backend:
  #     transport: "http"
  #     url: "http://scope:8000"
  #     auth: "none"
  #   health:
  #     probe:
  #       type: "http-jsonpath"
  #       interval_ms: 5000
  #       timeout_ms: 1500
  #       unhealthy_after: 2
  #       healthy_after: 1
  #       config:
  #         url: "http://scope:8000/api/v1/pipeline/status"
  #         path: "$.ready"
  #         equals: "true"
  #   extra:
  #     workload: "daydream-scope"
  #     media_schema: "scope-passthrough/v0"
  #     session_start_path: "/api/v1/session/start"
  #     session_stop_path: "/api/v1/session/stop"
  #     turn_provider: "cloudflare"
  #   constraints:
  #     tier: "standard"
  #     gpu_vendor: "NVIDIA"

  # ---- VTuber session runtime (session-control-plus-media) ----
  #
  # - id: "livepeer:vtuber-session"
  #   offering_id: "default"
  #   interaction_mode: "session-control-plus-media@v0"
  #   work_unit:
  #     name: "seconds"
  #     extractor: { type: "seconds-elapsed", granularity: 1 }
  #   price:
  #     amount_wei: "2500000"
  #     per_units: 1
  #   backend:
  #     transport: "http"
  #     url: "http://vtuber-runner:8080/api/sessions/start"
  #     auth: "none"
  #   extra:
  #     provider: "vtuber-runner"
  #     vtuber:
  #       task: "session"
  #     # Optional stable fields like vtuber.control_schema,
  #     # vtuber.media_schema, and vtuber.features.* may be
  #     # auto-hydrated from GET /options.
  #   constraints:
  #     tier: "standard"

  # ---- Live RTMP transcode (rtmp-ingress-hls-egress + ffmpeg-progress) ----
  # Stream the resulting LL-HLS playlist from the broker's /_hls/<sess>/...
  # path. The broker's --rtmp-listen-addr must be set for the listener to
  # bind. backend.url is the broker's externally-advertised host so the
  # session-open response can derive the RTMP and HLS URLs.
  #
  # - id: "video:live.rtmp"
  #   offering_id: "default"
  #   interaction_mode: "rtmp-ingress-hls-egress@v0"
  #   work_unit:
  #     name: "out_time_seconds"
  #     extractor: { type: "ffmpeg-progress", unit: "out_time_seconds" }
  #   price:
  #     amount_wei: "1000000"
  #     per_units: 1
  #   backend:
  #     transport: "ffmpeg-subprocess"
  #     profile: "h264-live-1080p-nvenc"
  #     url: "https://broker.example.com"

