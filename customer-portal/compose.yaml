services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: customer_portal
      POSTGRES_PASSWORD: customer_portal
      POSTGRES_DB: customer_portal
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "customer_portal"]
      interval: 1s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 5s
      retries: 30
