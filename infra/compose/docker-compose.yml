# Shared infrastructure services (Postgres, Redis, RustFS).
#
# Each service is gated behind a profile so nothing starts implicitly.
# Bring up only what you need, e.g.:
#
#   docker compose -f infra/compose/docker-compose.yml --profile pg up -d
#   docker compose -f infra/compose/docker-compose.yml --profile pg --profile redis up -d
#
# Per-component compose files (e.g. video-gateway/compose/docker-compose.yml)
# expect Postgres at the env-configured DATABASE_URL; defaults assume the
# postgres service below. Override DATABASE_URL / REDIS_URL for prod.

services:
  postgres:
    image: postgres:16
    profiles: [pg]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livepeer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livepeer}
      POSTGRES_DB: ${POSTGRES_DB:-livepeer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livepeer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: [redis]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    profiles: [rustfs]
    command:
      - /data
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER:-rustfsadmin}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD:-rustfsadmin}
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-init:
    image: amazon/aws-cli:latest
    profiles: [rustfs]
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ROOT_USER:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_ROOT_PASSWORD:-rustfsadmin}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - >
        aws --endpoint-url http://rustfs:9000 s3api create-bucket
        --bucket ${RUSTFS_DEFAULT_BUCKET:-transcoded} 2>/dev/null || true

volumes:
  pg-data: {}
  redis-data: {}
  rustfs-data: {}
