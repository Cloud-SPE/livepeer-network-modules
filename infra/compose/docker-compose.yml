# Shared infrastructure services (Postgres, Redis, MinIO).
#
# Each service is gated behind a profile so nothing starts implicitly.
# Bring up only what you need, e.g.:
#
#   docker compose -f infra/compose/docker-compose.yml --profile pg up -d
#   docker compose -f infra/compose/docker-compose.yml --profile pg --profile redis up -d
#
# Per-component compose files (e.g. video-gateway/compose/docker-compose.yml)
# expect Postgres at the env-configured DATABASE_URL; defaults assume the
# postgres service below. Override DATABASE_URL / REDIS_URL for prod.

services:
  postgres:
    image: postgres:16
    profiles: [pg]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livepeer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livepeer}
      POSTGRES_DB: ${POSTGRES_DB:-livepeer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livepeer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: [redis]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    profiles: [minio]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio4dmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio4dmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    profiles: [minio]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio4dmin} ${MINIO_ROOT_PASSWORD:-minio4dmin} &&
      mc mb --ignore-existing local/${MINIO_DEFAULT_BUCKET:-transcoded} &&
      mc anonymous set public local/${MINIO_DEFAULT_BUCKET:-transcoded}
      "

volumes:
  pg-data: {}
  redis-data: {}
  minio-data: {}
