# Overlay: front the OpenAI Gateway with nginx-proxy + acme-companion
# (Let's Encrypt HTTP-01 challenge).
#
# Layer this on top of docker-compose.yml when running behind the
# ingress-nginx stack on the same host. Removes the publicly-published
# :3000 port and registers the gateway with nginx-proxy via env vars.
# acme-companion issues / renews the cert via HTTP-01 (requires inbound
# :80 reachable from the public internet).
#
# Pick THIS overlay OR docker-compose.nginx-dns01.yml, not both.
#
# Usage:
#   docker compose \
#     -f infra/scenarios/gateway-onboarding/openai-gateway/docker-compose.yml \
#     -f infra/scenarios/gateway-onboarding/openai-gateway/docker-compose.nginx.yml \
#     --env-file infra/scenarios/gateway-onboarding/openai-gateway/.env \
#     up -d

services:
  openai-gateway:
    ports: []
    networks:
      - default
      - ingress
    environment:
      VIRTUAL_HOST: ${GATEWAY_HOST:?set GATEWAY_HOST to the public hostname for this gateway}
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: ${GATEWAY_HOST:?set GATEWAY_HOST to the public hostname for this gateway}

networks:
  ingress:
    external: true
