# Overlay: front the OpenAI Gateway with Traefik.
#
# Layer this on top of docker-compose.yml when running behind the
# ingress-traefik stack on the same host. Removes the publicly-published
# :3000 port (Traefik routes inbound traffic through the `ingress`
# network instead) and adds the Traefik labels for the public hostname.
#
# Usage:
#   docker compose \
#     -f infra/scenarios/gateway-onboarding/openai-gateway/docker-compose.yml \
#     -f infra/scenarios/gateway-onboarding/openai-gateway/docker-compose.traefik.yml \
#     --env-file infra/scenarios/gateway-onboarding/openai-gateway/.env \
#     up -d

services:
  openai-gateway:
    ports: []
    networks:
      - default
      - ingress
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ingress"

      - "traefik.http.routers.openai-gateway.entrypoints=websecure"
      - "traefik.http.routers.openai-gateway.service=openai-gateway"
      - "traefik.http.routers.openai-gateway.tls.certresolver=${TRAEFIK_CERTRESOLVER:-cloudflare}"
      - "traefik.http.routers.openai-gateway.rule=Host(`${GATEWAY_HOST:?set GATEWAY_HOST to the public hostname for this gateway}`)"
      - "traefik.http.services.openai-gateway.loadbalancer.server.port=3000"
      - "traefik.http.services.openai-gateway.loadbalancer.passhostheader=true"

networks:
  ingress:
    external: true
