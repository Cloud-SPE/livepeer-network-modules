# Overlay: front the Capability Broker with a Cloudflare Tunnel.
#
# Layer this on top of docker-compose.yml when running behind the
# ingress-cloudflared stack on the same host. Removes the publicly-
# published 8080 port (cloudflared reaches the container by name on the
# `ingress` network) and attaches the service to that network.
#
# No Traefik labels — the public-hostname mapping lives in the Cloudflare
# Zero Trust dashboard, not in this compose file.
#
# Metrics (:9090) stays on loopback for local debugging.
#
# Usage:
#   docker compose \
#     -f infra/scenarios/orchestrator-onboarding/capability-broker/docker-compose.yml \
#     -f infra/scenarios/orchestrator-onboarding/capability-broker/docker-compose.cloudflared.yml \
#     --env-file infra/scenarios/orchestrator-onboarding/capability-broker/.env \
#     up -d
#
# Zero Trust UI mapping for this host:
#   Public hostname:  <your broker domain, e.g. broker-a.example.com>
#                     (must match the base_url for this broker in
#                      your Orch Coordinator's coordinator-config.yaml)
#   Service:          http://capability-broker:8080

services:
  capability-broker:
    ports:
      - "${BROKER_METRICS_BIND:-127.0.0.1}:${BROKER_METRICS_PORT:-9090}:9090"
    networks:
      - default
      - ingress

networks:
  ingress:
    external: true
