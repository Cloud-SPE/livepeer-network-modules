# Overlay: front the Orch Coordinator with nginx-proxy + acme-companion
# using the Cloudflare DNS-01 challenge.
#
# Same shape as docker-compose.nginx.yml, but acme-companion issues the
# cert via DNS-01 instead of HTTP-01. Use this when:
#   - port :80 is not reachable from the public internet, or
#   - you want wildcard certs / faster issuance via DNS, or
#   - your domain is on Cloudflare DNS and you prefer the DNS path.
#
# Pick THIS overlay OR docker-compose.nginx.yml, not both.
#
# Requires CF_DNS_API_TOKEN, CF_ACCOUNT_ID, CF_ZONE_ID in your .env. The
# token must have Zone:DNS:Edit on the zone hosting COORDINATOR_HOST.
#
# Usage:
#   docker compose \
#     -f infra/scenarios/orchestrator-onboarding/orch-coordinator/docker-compose.yml \
#     -f infra/scenarios/orchestrator-onboarding/orch-coordinator/docker-compose.nginx-dns01.yml \
#     --env-file infra/scenarios/orchestrator-onboarding/orch-coordinator/.env \
#     up -d

services:
  orch-coordinator:
    ports:
      - "${COORDINATOR_ADMIN_BIND:-127.0.0.1}:${COORDINATOR_LISTEN_PORT:-8080}:8080"
      - "${COORDINATOR_METRICS_BIND:-127.0.0.1}:${COORDINATOR_METRICS_PORT:-9091}:9091"
    networks:
      - default
      - ingress
    environment:
      VIRTUAL_HOST: ${COORDINATOR_HOST:?set COORDINATOR_HOST to the public hostname for this coordinator}
      VIRTUAL_PORT: "8081"
      VIRTUAL_PATH: "/.well-known/livepeer-registry.json"
      LETSENCRYPT_HOST: ${COORDINATOR_HOST:?set COORDINATOR_HOST to the public hostname for this coordinator}
      ACMESH_DNS_API_CONFIG: "DNS_API=dns_cf;CF_Token=${CF_DNS_API_TOKEN:?set CF_DNS_API_TOKEN};CF_Account_ID=${CF_ACCOUNT_ID:?set CF_ACCOUNT_ID};CF_Zone_ID=${CF_ZONE_ID:?set CF_ZONE_ID}"

networks:
  ingress:
    external: true
