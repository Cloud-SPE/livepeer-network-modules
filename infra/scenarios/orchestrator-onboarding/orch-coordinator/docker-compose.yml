# Scenario: Orch Coordinator.
#
# Single public-facing node that serves the orchestrator's signed registry
# manifest at /.well-known/livepeer-registry.json — the URL gateways resolve
# from the on-chain AI Service Registry.
#
# Two listeners:
#   :8080  — operator admin API (keep private)
#   :8081  — public registry endpoint (expose to the internet, behind TLS)
#   :9091  — Prometheus metrics (keep private)
#
# Production should terminate TLS at a reverse proxy in front of :8081. A
# Traefik reference setup is documented in a separate section.

services:
  orch-coordinator:
    image: ${REGISTRY:-tztcloud}/livepeer-orch-coordinator:${TAG:-v1.0.0}
    container_name: orch-coordinator
    hostname: orch-coordinator
    command:
      - --config=/etc/livepeer/orch-coordinator.yaml
      - --data-dir=/srv/data
      - --listen=:8080
      - --public-listen=:8081
      - --metrics-listen=:9091
      - --log-level=${COORDINATOR_LOG_LEVEL:-info}
      - --log-format=${COORDINATOR_LOG_FORMAT:-text}
      - --scrape-interval=${COORDINATOR_SCRAPE_INTERVAL:-5m}
    ports:
      # Public registry endpoint. Put a TLS-terminating reverse proxy in front
      # of this in production.
      - "${COORDINATOR_PUBLIC_BIND:-0.0.0.0}:${COORDINATOR_PUBLIC_PORT:-8081}:8081"
      # Admin + metrics. Bind to loopback by default; reach over SSH tunnel.
      - "${COORDINATOR_ADMIN_BIND:-127.0.0.1}:${COORDINATOR_LISTEN_PORT:-8080}:8080"
      - "${COORDINATOR_METRICS_BIND:-127.0.0.1}:${COORDINATOR_METRICS_PORT:-9091}:9091"
    environment:
      ORCH_COORDINATOR_ADMIN_TOKENS: ${ORCH_COORDINATOR_ADMIN_TOKENS}
    volumes:
      - ${COORDINATOR_CONFIG:-/opt/livepeer/coordinator-config.yaml}:/etc/livepeer/orch-coordinator.yaml:ro
      - coordinator-data:/srv/data
    restart: unless-stopped

volumes:
  coordinator-data: {}
