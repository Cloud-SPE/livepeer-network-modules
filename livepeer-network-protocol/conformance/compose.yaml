# Conformance test stack: runner + capability-broker.
# Runs with: make test-compose
#
# Topology:
#   runner — tztcloud/livepeer-conformance image. Runs the test binary and
#            an in-process mock backend on :9000 (reachable inside the
#            compose network as `runner:9000`). Drives the broker via HTTP.
#   broker — tztcloud/livepeer-capability-broker image. Mounts
#            test-broker-config.yaml; capability backends point at
#            `http://runner:9000/...` so the runner controls the response
#            per-fixture.
#
# Build prerequisite: both images must exist locally. Run from the repo root:
#
#   make -C livepeer-network-protocol/conformance build         # runner image
#   make -C capability-broker build                             # broker image
#
# Or use the Makefile's `test-compose` target which builds both first.

services:
  broker:
    image: tztcloud/livepeer-capability-broker:dev
    networks:
      - conformance
    volumes:
      - ./test-broker-config.yaml:/etc/livepeer/host-config.yaml:ro
    expose:
      - "8080"
      - "9090"
    command:
      - --config=/etc/livepeer/host-config.yaml
      - --listen=:8080
      - --metrics=:9090

  runner:
    image: tztcloud/livepeer-conformance:dev
    depends_on:
      - broker
    networks:
      - conformance
    command:
      - --target=broker
      - --url=http://broker:8080
      - --mock-addr=:9000
      - --fixtures=/fixtures

networks:
  conformance:
    driver: bridge
