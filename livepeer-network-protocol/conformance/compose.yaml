# Conformance test stack: runner + capability-broker + payment-daemon
# (receiver) + payer-daemon (sender).
# Runs with: make test-compose
#
# Topology:
#   runner          — tztcloud/livepeer-conformance image. Runs the test
#                     binary and an in-process mock backend on :9000.
#                     Mints `Livepeer-Payment` envelopes by calling
#                     PayerDaemon.CreatePayment over the shared
#                     `livepeer-payment` unix-socket volume.
#   broker          — tztcloud/livepeer-capability-broker image. Backends
#                     point at `http://runner:9000/...` so the runner
#                     controls the response per-fixture. Talks to
#                     payment-daemon (receiver) over the same shared
#                     volume.
#   payment-daemon  — tztcloud/livepeer-payment-daemon:dev in
#                     `--mode=receiver`. Validates incoming Payment
#                     bytes (stub validation in v0.2), tracks per-
#                     (sender, work_id) balances in BoltDB.
#   payer-daemon    — tztcloud/livepeer-payment-daemon:dev in
#                     `--mode=sender`. Mints Payment envelopes for the
#                     runner. Same image, same binary, different mode.
#
# Build prerequisite: all four image roles need the local images. Run
# from the repo root:
#
#   make -C livepeer-network-protocol/conformance build
#   make -C capability-broker build
#   make -C payment-daemon build
#
# The Makefile's `test-compose` target builds all three first.

services:
  payment-daemon:
    image: tztcloud/livepeer-payment-daemon:dev
    networks: [conformance]
    volumes:
      - livepeer-payment:/var/run/livepeer
      - livepeer-payment-data:/var/lib/livepeer/payment-daemon
    command:
      - --mode=receiver
      - --socket=/var/run/livepeer/payment-daemon.sock
      - --db=/var/lib/livepeer/payment-daemon/sessions.db

  payer-daemon:
    image: tztcloud/livepeer-payment-daemon:dev
    networks: [conformance]
    volumes:
      - livepeer-payment:/var/run/livepeer
    command:
      - --mode=sender
      - --socket=/var/run/livepeer/payer-daemon.sock

  broker:
    image: tztcloud/livepeer-capability-broker:dev
    depends_on: [payment-daemon]
    networks: [conformance]
    volumes:
      - ./test-broker-config.yaml:/etc/livepeer/host-config.yaml:ro
      - livepeer-payment:/var/run/livepeer
    expose:
      - "8080"
      - "9090"
    command:
      - --config=/etc/livepeer/host-config.yaml
      - --listen=:8080
      - --metrics=:9090

  runner:
    image: tztcloud/livepeer-conformance:dev
    depends_on: [broker, payer-daemon]
    networks: [conformance]
    volumes:
      - livepeer-payment:/var/run/livepeer
    command:
      - --target=broker
      - --url=http://broker:8080
      - --mock-addr=:9000
      - --fixtures=/fixtures
      - --payer-socket=/var/run/livepeer/payer-daemon.sock

networks:
  conformance:
    driver: bridge

volumes:
  # Shared unix-socket directory: hosts both payment-daemon.sock
  # (receiver) and payer-daemon.sock (sender). Mounted by every
  # container that needs to dial either daemon.
  livepeer-payment: {}
  # BoltDB persistence for the receiver. Wiped between `make
  # test-compose` runs.
  livepeer-payment-data: {}
