# Happy-path conformance fixture for the http-multipart@v0 mode.
#
# Demonstrates a multipart/form-data upload — request body is a literal
# multipart payload with a file part. Broker forwards verbatim; mock
# backend returns a usage block; broker reports Livepeer-Work-Units.

name: happy-path
mode: http-multipart@v0
spec_version: "0.1"
description: |
  Vanilla success path for http-multipart@v0. Runner sends a small
  multipart upload; broker forwards (Livepeer-* stripped, no auth
  injected since auth=none), mock returns a usage block, broker reports
  Livepeer-Work-Units in the regular header slot.

setup:
  capability:
    id: test:happy-path-multipart:v1
    offering_id: default
    interaction_mode: http-multipart@v0
    work_unit:
      name: characters
      extractor:
        type: response-jsonpath
        path: $.usage.characters
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: http
      url: http://mock-backend/handler
      auth: none

request:
  method: POST
  path: /v1/cap
  headers:
    Livepeer-Capability: test:happy-path-multipart:v1
    Livepeer-Offering: default
    Livepeer-Payment: <runner-generated-payment-blob>
    Livepeer-Spec-Version: "0.1"
    Livepeer-Mode: http-multipart@v0
    Content-Type: 'multipart/form-data; boundary=----LivepeerConformanceBoundary'
  # Literal multipart payload. The boundary string in Content-Type must
  # match the boundary in the body. CRLF is required between header lines
  # and before the closing boundary per RFC 7578; YAML's literal block
  # scalar (|) preserves \n which Go's net/http accepts.
  body: |
    ------LivepeerConformanceBoundary
    Content-Disposition: form-data; name="file"; filename="hello.txt"
    Content-Type: text/plain

    hello multipart world
    ------LivepeerConformanceBoundary
    Content-Disposition: form-data; name="model"

    test-model
    ------LivepeerConformanceBoundary--

backend_assertions:
  method: POST
  livepeer_headers_present: false
  authorization_header_present: false

response_expect:
  status: 200
  headers_present:
    - Livepeer-Work-Units
    - Livepeer-Request-Id
  livepeer_work_units: 21
  body_passthrough: true

backend_response:
  status: 200
  headers:
    Content-Type: application/json
  body: |
    {"id":"transcribe-x","text":"hello multipart world","usage":{"characters":21}}
