# Conformance fixture: bytes-counted extractor.
#
# Counts response body bytes only; granularity 1 (bytes-as-units).
# Backend body is exactly 17 bytes ("hello bytes-test\n") → 17 work units.

name: bytes-counted
mode: http-reqresp@v0
spec_version: "0.1"
description: |
  http-reqresp@v0 with the bytes-counted extractor. Counts response
  body bytes; verifies the configurable direction (response-only).

setup:
  capability:
    id: test:extractor-bytes-counted:v1
    offering_id: default
    interaction_mode: http-reqresp@v0
    work_unit:
      name: bytes
      extractor:
        type: bytes-counted
        direction: response
        granularity: 1
    price:
      amount_wei: "10"
      per_units: 1
    backend:
      transport: http
      url: http://mock-backend/handler
      auth: none

request:
  method: POST
  path: /v1/cap
  headers:
    Livepeer-Capability: test:extractor-bytes-counted:v1
    Livepeer-Offering: default
    Livepeer-Payment: <runner-generated-payment-blob>
    Livepeer-Spec-Version: "0.1"
    Livepeer-Mode: http-reqresp@v0
    Content-Type: application/json
  body: |
    {}

# Body is 17 bytes including trailing newline from YAML's |
backend_response:
  status: 200
  headers:
    Content-Type: text/plain
  body: |
    hello bytes-test

backend_assertions:
  livepeer_headers_present: false

response_expect:
  status: 200
  headers_present:
    - Livepeer-Work-Units
  livepeer_work_units: 17
  body_passthrough: true
