# Happy-path conformance fixture for the http-stream@v0 mode.
#
# Demonstrates the trailer-based reporting of Livepeer-Work-Units. The runner
# reads the response body to EOF, then asserts the value from resp.Trailer.

name: happy-path
mode: http-stream@v0
spec_version: "0.1"
description: |
  Vanilla success path for http-stream@v0. Broker forwards the request to a
  mock backend that returns a small SSE-shaped body; broker emits the body
  back to the runner with `Trailer: Livepeer-Work-Units` declared and the
  value set via the trailer slot.

setup:
  capability:
    id: test:happy-path-stream:v1
    offering_id: default
    interaction_mode: http-stream@v0
    work_unit:
      name: tokens
      extractor:
        type: response-jsonpath
        path: $.usage.total_tokens
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: http
      url: http://mock-backend/handler
      auth: none

request:
  method: POST
  path: /v1/cap
  headers:
    Livepeer-Capability: test:happy-path-stream:v1
    Livepeer-Offering: default
    Livepeer-Payment: <runner-generated-payment-blob>
    Livepeer-Spec-Version: "0.1"
    Livepeer-Mode: http-stream@v0
    Content-Type: application/json
    Accept: text/event-stream
  body: |
    {"prompt":"streaming test","stream":true}

backend_response:
  status: 200
  headers:
    Content-Type: text/event-stream
  # The body here mimics what an OpenAI-style streaming chat-completions
  # backend would return when stream_options.include_usage: true is set:
  # the final SSE event carries a usage block. The runner-side mock
  # echoes this back to the broker; the broker's response-jsonpath
  # extractor reads usage.total_tokens.
  body: |
    {"id":"chatcmpl-x","choices":[],"usage":{"total_tokens":482}}

backend_assertions:
  method: POST
  body_received_raw: |
    {"prompt":"streaming test","stream":true}
  livepeer_headers_present: false
  authorization_header_present: false

response_expect:
  status: 200
  headers_present:
    - Livepeer-Work-Units
    - Livepeer-Request-Id
  livepeer_work_units: 482
  body_passthrough: true
