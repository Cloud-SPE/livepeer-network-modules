# Backpressure conformance fixture for session-control-plus-media@v0.
# Plan 0012-followup §11: runner stops reading control-WS while the
# broker delivers high-rate envelopes. Asserts the broker-side close
# carries Livepeer-Error: backpressure_drop and the session is torn
# down.

name: backpressure
mode: session-control-plus-media@v0
spec_version: "0.1"
description: |
  Runner opens control-WS, then deliberately stops reading. The stub
  session-runner is configured to stream a fast burst of envelopes
  back. Once the broker's per-direction send buffer stays full beyond
  --session-control-backpressure-drop-after, the broker must close
  the WS with reason "backpressure_drop". The session record is
  removed; ledger reflects accumulated units up to drop.

setup:
  capability:
    id: test:backpressure-session:v1
    offering_id: default
    interaction_mode: session-control-plus-media@v0
    work_unit:
      name: seconds
      extractor:
        type: seconds-elapsed
        granularity: 1
    price:
      amount_wei: "1500000"
      per_units: 1
    backend:
      transport: session-runner
      session_runner:
        image: "tztcloud/livepeer-conformance-session-runner:v0"
        command: ["/bin/session-runner-stub"]
        env:
          LIVEPEER_STUB_BEHAVIOR: "burst"
          LIVEPEER_STUB_BURST_RATE_HZ: "1000"
        startup_timeout: "10s"

request:
  method: POST
  path: /v1/cap
  headers:
    Livepeer-Capability: test:backpressure-session:v1
    Livepeer-Offering: default
    Livepeer-Payment: <runner-generated-payment-blob>
    Livepeer-Spec-Version: "0.1"
    Livepeer-Mode: session-control-plus-media@v0
    Content-Type: application/json
  body: |
    {}

backend_response:
  status: 0
  body: ""

response_expect:
  status: 202
  body_fields_present:
    - session_id
    - control_url

session_control:
  upgrade: true
  pause_after_session_started: true
  expect_close_reason: "backpressure_drop"
  expect_close_code: 1008
