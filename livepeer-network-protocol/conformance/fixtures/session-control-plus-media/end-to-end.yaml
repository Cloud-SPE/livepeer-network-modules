# End-to-end conformance fixture for session-control-plus-media@v0.
# Plan 0012-followup §11: runner sends session-open POST, opens the
# control-WS, exchanges an `echo.request` workload envelope with the
# stub session-runner subprocess, asserts the echoed reply, then closes
# cleanly with `session.end`.

name: end-to-end
mode: session-control-plus-media@v0
spec_version: "0.1"
description: |
  session-open POST → 202 + control_url → control-WS upgrade → server
  emits session.started + media.negotiate.start → runner sends a
  workload envelope (echo.request) and asserts an echoed reply within
  2s → runner emits session.end → asserts WS closes with code 1000 +
  no leaked sockets / subprocesses.

setup:
  capability:
    id: test:end-to-end-session:v1
    offering_id: default
    interaction_mode: session-control-plus-media@v0
    work_unit:
      name: seconds
      extractor:
        type: seconds-elapsed
        granularity: 1
    price:
      amount_wei: "1500000"
      per_units: 1
    backend:
      transport: session-runner
      session_runner:
        image: "tztcloud/livepeer-conformance-session-runner:v0"
        command: ["/bin/session-runner-stub"]
        env:
          LIVEPEER_STUB_BEHAVIOR: "echo"
        startup_timeout: "10s"
        media:
          publish:
            transport: "webrtc"
          egress:
            transport: "webrtc"

request:
  method: POST
  path: /v1/cap
  headers:
    Livepeer-Capability: test:end-to-end-session:v1
    Livepeer-Offering: default
    Livepeer-Payment: <runner-generated-payment-blob>
    Livepeer-Spec-Version: "0.1"
    Livepeer-Mode: session-control-plus-media@v0
    Content-Type: application/json
  body: |
    {"persona":"test","constraints":{}}

backend_response:
  status: 0
  body: ""

response_expect:
  status: 202
  headers_present:
    - Livepeer-Request-Id
  body_fields_present:
    - session_id
    - control_url
    - media.publish_url
    - media.publish_auth
    - expires_at

session_control:
  upgrade: true
  expect_envelopes:
    - type: session.started
    - type: media.negotiate.start
  send_envelopes:
    - type: echo.request
      body: '{"text":"hello"}'
  expect_echo: true
  send_session_end: true
  expect_close_code: 1000
