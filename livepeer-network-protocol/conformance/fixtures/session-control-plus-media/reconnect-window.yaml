# Reconnect-window conformance fixture for session-control-plus-media@v0.
# Plan 0012-followup §11 + §4.2.1: runner connects control-WS, exchanges
# a few server-emitted messages (capturing seq), then force-closes the
# WS without sending session.end. Within 5s the runner reconnects to
# the same path with Last-Seq set to the last observed seq; asserts
# buffered server-emitted messages with seq > Last-Seq replay over the
# new WS, session.reconnected fires, the session continues, and the
# payment ledger reflects continuous billing across the gap.

name: reconnect-window
mode: session-control-plus-media@v0
spec_version: "0.1"
description: |
  Reconnect within --session-control-reconnect-window: server-side
  state survives, runner stays alive, payment ticker keeps billing,
  buffered server-emitted messages with seq > Last-Seq replay over
  the new WS, session.reconnected fires.

setup:
  capability:
    id: test:reconnect-session:v1
    offering_id: default
    interaction_mode: session-control-plus-media@v0
    work_unit:
      name: seconds
      extractor:
        type: seconds-elapsed
        granularity: 1
    price:
      amount_wei: "1500000"
      per_units: 1
    backend:
      transport: session-runner
      session_runner:
        image: "tztcloud/livepeer-conformance-session-runner:v0"
        command: ["/bin/session-runner-stub"]
        env:
          LIVEPEER_STUB_BEHAVIOR: "tick"
          LIVEPEER_STUB_TICK_INTERVAL_MS: "100"
        startup_timeout: "10s"

request:
  method: POST
  path: /v1/cap
  headers:
    Livepeer-Capability: test:reconnect-session:v1
    Livepeer-Offering: default
    Livepeer-Payment: <runner-generated-payment-blob>
    Livepeer-Spec-Version: "0.1"
    Livepeer-Mode: session-control-plus-media@v0
    Content-Type: application/json
  body: |
    {}

backend_response:
  status: 0
  body: ""

response_expect:
  status: 202
  body_fields_present:
    - session_id
    - control_url

session_control:
  upgrade: true
  observe_envelopes_until_seq: 3
  force_close_no_session_end: true
  reconnect_after_ms: 1000
  reconnect_with_last_seq: true
  expect_envelopes_after_reconnect:
    - type: session.reconnected
  expect_replayed_seq_gt_last: true
  expect_balance_continuous: true
  send_session_end: true
  expect_close_code: 1000
