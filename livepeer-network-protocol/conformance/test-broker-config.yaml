# Broker host-config used by the conformance compose stack.
#
# Each entry must satisfy a fixture under fixtures/<mode>/. Backend URLs point
# at the runner container's in-process mock backend (`runner:9000`); the
# runner programs the mock per-fixture before sending each test request.
#
# Add an entry here when you add a fixture that exercises a new
# (capability_id, offering_id) pair.

identity:
  orch_eth_address: 0x1234567890abcdef1234567890abcdef12345678
  label: "conformance-broker"

listen:
  paid: ":8080"
  metrics: ":9090"

payment_daemon:
  mock: true

capabilities:
  # ---- fixtures/http-reqresp/happy-path.yaml ----
  - id: "test:happy-path:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "barks"
      extractor:
        type: "response-jsonpath"
        path: "$.units"
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: "http"
      url: "http://runner:9000/handler"
      auth: "none"

  # ---- fixtures/http-stream/happy-path.yaml ----
  - id: "test:happy-path-stream:v1"
    offering_id: "default"
    interaction_mode: "http-stream@v0"
    work_unit:
      name: "tokens"
      extractor:
        type: "response-jsonpath"
        path: "$.usage.total_tokens"
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: "http"
      url: "http://runner:9000/handler"
      auth: "none"

  # ---- fixtures/http-multipart/happy-path.yaml ----
  - id: "test:happy-path-multipart:v1"
    offering_id: "default"
    interaction_mode: "http-multipart@v0"
    work_unit:
      name: "characters"
      extractor:
        type: "response-jsonpath"
        path: "$.usage.characters"
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: "http"
      url: "http://runner:9000/handler"
      auth: "none"

  # ---- fixtures/ws-realtime/happy-path.yaml ----
  # backend.url path /ws is matched by the runner mock backend's WS handler.
  - id: "test:happy-path-ws:v1"
    offering_id: "default"
    interaction_mode: "ws-realtime@v0"
    work_unit:
      name: "bytes"
      extractor:
        type: "response-jsonpath"
        path: "$.bytes"
    price:
      amount_wei: "10"
      per_units: 1
    backend:
      transport: "http"
      url: "http://runner:9000/ws"
      auth: "none"

  # ---- fixtures/rtmp-ingress-hls-egress/happy-path.yaml ----
  # v0.1 session-open phase: backend.url is used to derive the public URLs
  # the broker returns in its 202 response. No actual media is ingested.
  - id: "test:happy-path-rtmp:v1"
    offering_id: "default"
    interaction_mode: "rtmp-ingress-hls-egress@v0"
    work_unit:
      name: "video-frame-megapixel"
      extractor:
        type: "response-jsonpath"
        path: "$.units"
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: "http"
      url: "http://broker.example.com/handler"
      auth: "none"

  # ---- fixtures/session-control-plus-media/happy-path.yaml ----
  - id: "test:happy-path-session:v1"
    offering_id: "default"
    interaction_mode: "session-control-plus-media@v0"
    work_unit:
      name: "seconds"
      extractor:
        type: "response-jsonpath"
        path: "$.units"
    price:
      amount_wei: "100"
      per_units: 1
    backend:
      transport: "http"
      url: "http://broker.example.com/handler"
      auth: "none"

  # ---- fixtures/http-reqresp/openai-usage.yaml ----
  - id: "test:extractor-openai-usage:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "tokens"
      extractor:
        type: "openai-usage"
        field: "total_tokens"
    price: { amount_wei: "1000", per_units: 1 }
    backend:
      transport: "http"
      url: "http://runner:9000/handler"
      auth: "none"

  # ---- fixtures/http-reqresp/request-formula.yaml ----
  - id: "test:extractor-request-formula:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "image_step_megapixel"
      extractor:
        type: "request-formula"
        expression: "(width * height * steps) / 1000000"
        fields:
          width: "$.size.width"
          height: "$.size.height"
          steps: "$.num_inference_steps"
    price: { amount_wei: "1000000", per_units: 1 }
    backend:
      transport: "http"
      url: "http://runner:9000/handler"
      auth: "none"

  # ---- fixtures/http-reqresp/bytes-counted.yaml ----
  - id: "test:extractor-bytes-counted:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "bytes"
      extractor:
        type: "bytes-counted"
        direction: "response"
        granularity: 1
    price: { amount_wei: "10", per_units: 1 }
    backend:
      transport: "http"
      url: "http://runner:9000/handler"
      auth: "none"

  # ---- fixtures/http-reqresp/seconds-elapsed.yaml ----
  - id: "test:extractor-seconds-elapsed:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "milliseconds"
      extractor:
        type: "seconds-elapsed"
        granularity: 0.001
        rounding: "ceil"
    price: { amount_wei: "1", per_units: 1 }
    backend:
      transport: "http"
      url: "http://runner:9000/handler"
      auth: "none"

  # ---- fixtures/http-reqresp/ffmpeg-progress.yaml ----
  - id: "test:extractor-ffmpeg-progress:v1"
    offering_id: "default"
    interaction_mode: "http-reqresp@v0"
    work_unit:
      name: "out_time_seconds"
      extractor:
        type: "ffmpeg-progress"
        unit: "out_time_seconds"
    price: { amount_wei: "100", per_units: 1 }
    backend:
      transport: "http"
      url: "http://runner:9000/handler"
      auth: "none"
