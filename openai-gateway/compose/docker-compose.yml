# Run-only compose for openai-gateway. Build via
# `./infra/scripts/build-images.sh openai-gateway`.
#
# Reaches a co-located capability-broker via LIVEPEER_BROKER_URL and a
# co-located payment-daemon (sender mode) via the UDS socket.
# Postgres is expected externally — bring it up via
# `infra/compose/docker-compose.yml --profile pg` first.

services:
  openai-gateway:
    image: ${REGISTRY:-tztcloud}/livepeer-openai-gateway-reference:${TAG:-v1.0.0}
    environment:
      PORT: "3000"
      LIVEPEER_BROKER_URL: ${LIVEPEER_BROKER_URL:-http://capability-broker:8080}
      LIVEPEER_PAYER_DAEMON_SOCKET: ${LIVEPEER_PAYER_DAEMON_SOCKET:-/var/run/livepeer/payer-daemon.sock}
      LIVEPEER_DEFAULT_OFFERING: ${LIVEPEER_DEFAULT_OFFERING:-default}
      DATABASE_URL: ${DATABASE_URL:-postgres://livepeer:livepeer@postgres:5432/openai_gateway}
      OPENAI_AUDIO_SPEECH_ENABLED: ${OPENAI_AUDIO_SPEECH_ENABLED:-false}
      BROKER_CALL_TIMEOUT_MS: ${BROKER_CALL_TIMEOUT_MS:-30000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${OPENAI_GATEWAY_PORT:-3000}:3000"
    volumes:
      - ${PAYMENT_DAEMON_SOCKET_DIR:-/var/run/livepeer}:/var/run/livepeer
    restart: unless-stopped
