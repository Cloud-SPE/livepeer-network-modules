services:
  vllm_embeddings:
    image: vllm/vllm-openai:latest
    container_name: vllm_embeddings
    runtime: nvidia
    command:
      - --model=BAAI/bge-large-en-v1.5
      - --host=0.0.0.0
      - --port=8000
      - --task=embed
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8001:8000"

  openai_embeddings_runner:
    depends_on:
      - vllm_embeddings
    environment:
      - UPSTREAM_URL=http://vllm_embeddings:8000/v1/embeddings

volumes:
  hf-cache: {}
