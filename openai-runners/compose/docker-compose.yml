# Run-only compose for openai-runners. Build via
# `./infra/scripts/build-images.sh openai-runner-chat openai-runner-embeddings
#                                  openai-image-generation-runner image-model-downloader`.
#
# Overlays alongside this base for upstream backends:
#   docker-compose.ollama.yml          — local ollama (chat + embeddings)
#   docker-compose.vllm.chat.yml       — local vllm (chat)
#   docker-compose.vllm.embeddings.yml — local vllm (embeddings)
#   docker-compose.audio.yml           — openai-audio-runner + tts-runner

services:
  openai_chat_completion_runner:
    image: ${REGISTRY:-tztcloud}/openai-runner-chat:${TAG:-v1.0.0}
    environment:
      - CAPABILITY_NAME=openai-chat-completions
      - RUNNER_ADDR=:8080
      - UPSTREAM_URL=${CHAT_UPSTREAM_URL:-http://ollama:11434/v1/chat/completions}
      - METRICS_ENABLED=false
    ports:
      - "${CHAT_RUNNER_PORT:-8090}:8080"

  openai_embeddings_runner:
    image: ${REGISTRY:-tztcloud}/openai-runner-embeddings:${TAG:-v1.0.0}
    environment:
      - CAPABILITY_NAME=openai-text-embeddings
      - RUNNER_ADDR=:8080
      - UPSTREAM_URL=${EMBEDDINGS_UPSTREAM_URL:-http://ollama:11434/v1/embeddings}
      - METRICS_ENABLED=false
    ports:
      - "${EMBEDDINGS_RUNNER_PORT:-8091}:8080"

  openai_image_runner:
    image: ${REGISTRY:-tztcloud}/openai-image-generation-runner:${TAG:-v1.0.0}
    runtime: nvidia
    environment:
      - CAPABILITY_NAME=image-generation
      - MODEL_ID=${IMAGE_MODEL_ID:-SG161222/RealVisXL_V4.0_Lightning}
      - MODEL_DIR=/models
      - RUNNER_PORT=8080
      - DEVICE=cuda
      - DTYPE=float16
      - MAX_QUEUE_SIZE=5
      - USE_TORCH_COMPILE=false
      - METRICS_ENABLED=false
    volumes:
      - ai-image-models:/models
      - ai-image-kernel-cache:/cache
    ports:
      - "${IMAGE_RUNNER_PORT:-8092}:8080"

  image_model_downloader:
    image: ${REGISTRY:-tztcloud}/image-model-downloader:${TAG:-v1.0.0}
    profiles: [downloader]
    environment:
      - MODEL_IDS=${IMAGE_MODEL_ID:-SG161222/RealVisXL_V4.0_Lightning}
      - MODEL_DIR=/models
    volumes:
      - ai-image-models:/models

volumes:
  ai-image-models: {}
  ai-image-kernel-cache: {}
