# Run-only compose for orch-coordinator. Build via
# `./infra/scripts/build-images.sh orch-coordinator`.
#
# Three listeners on intentionally separate ports:
#   8080 — admin UX (LAN-bound)
#   8081 — public resolver-facing /.well-known/livepeer-registry.json
#   9091 — Prometheus + healthz
#
# `--dev` boots with synthetic broker fixtures; for real use, mount a
# coordinator-config.yaml that lists your broker endpoint(s).

services:
  # Synthetic-fixture mode for smoke tests. No config file required.
  orch-coordinator-dev:
    image: ${REGISTRY:-tztcloud}/livepeer-orch-coordinator:${TAG:-v1.0.0}
    environment:
      ORCH_COORDINATOR_ADMIN_TOKENS: ${ORCH_COORDINATOR_ADMIN_TOKENS:-}
    command:
      - --dev
      - --listen=:8080
      - --public-listen=:8081
      - --metrics-listen=:9091
      - --log-level=debug
    ports:
      - "${COORDINATOR_LISTEN_PORT:-8080}:8080"
      - "${COORDINATOR_PUBLIC_PORT:-8081}:8081"
      - "${COORDINATOR_METRICS_PORT:-9091}:9091"

volumes:
  coordinator-data: {}