{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{.Title}} — orch-coordinator</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header>
  <nav>
    <a href="/" class="brand">orch-coordinator</a>
    {{if .OrchEthAddress}}
    <span class="orch">{{.OrchEthAddress}}</span>
    <a href="/" class="navlink">Roster</a>
    <a href="/diff" class="navlink">Diff</a>
    <a href="/audit" class="navlink">Audit</a>
    <a href="/candidate.tar.gz" class="navlink">Download candidate</a>
    {{else}}
    <span class="orch">operator login</span>
    {{end}}
    {{if .Actor}}
    <span class="actor">actor {{.Actor}}</span>
    <form method="post" action="/logout" class="logout">
      <button type="submit">Logout</button>
    </form>
    {{end}}
  </nav>
</header>
<main>
{{block "content" .}}{{end}}
</main>
<footer>
  <span>{{.Version}}</span>
  <a href="/healthz">healthz</a>
</footer>
</body>
</html>
{{end}}
