# Run-only compose for rerank-runner. Build via
# `./infra/scripts/build-images.sh rerank-runner rerank-model-downloader`.

services:
  rerank_runner:
    image: ${REGISTRY:-tztcloud}/rerank-runner:${TAG:-v1.0.0}
    runtime: nvidia
    environment:
      - CAPABILITY_NAME=rerank
      - MODEL_ID=${RERANK_MODEL_ID:-zeroentropy/zerank-2}
      - MODEL_DIR=/models
      - RUNNER_PORT=8080
      - DEVICE=cuda
      - DTYPE=bfloat16
      - MAX_QUEUE_SIZE=5
      - MAX_BATCH_SIZE=1000
      - INFERENCE_BATCH_SIZE=64
      - METRICS_ENABLED=false
    volumes:
      - ai-rerank-models:/models
    ports:
      - "${RERANK_RUNNER_PORT:-8081}:8080"

  rerank_model_downloader:
    image: ${REGISTRY:-tztcloud}/rerank-model-downloader:${TAG:-v1.0.0}
    profiles: [downloader]
    environment:
      - MODEL_ID=${RERANK_MODEL_ID:-zeroentropy/zerank-2}
      - MODEL_DIR=/models
    volumes:
      - ai-rerank-models:/models

volumes:
  ai-rerank-models: {}
