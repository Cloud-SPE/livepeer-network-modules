# Local-only smoke stack for secure-orch-console.
#
# Hard rule: secure-orch never accepts inbound connections. The
# console binds 127.0.0.1:<port> inside the container; exposing it
# to the host's loopback via `ports: - "127.0.0.1:8080:8080"`
# preserves the application-layer contract (no listener on a routable
# interface).
#
# Run with `make run` once you've populated ./run/keystore.json and
# ./run/password. The web UI (commit 5) extends this stack; the air-gap
# polish (commit 7) adds USB-mount monitoring.

services:
  secure-orch-console:
    image: tztcloud/livepeer-secure-orch-console:dev
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./run:/srv
    command:
      - --keystore=v3:/srv/keystore.json
      - --keystore-password-file=/srv/password
      - --inbox=/srv/inbox
      - --outbox=/srv/outbox
      - --last-signed=/srv/lib/last-signed.json
      - --audit-log=/srv/log/audit.log.jsonl
      - --listen=127.0.0.1:8080
