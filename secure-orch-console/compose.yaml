# Local smoke stack for secure-orch-console.
#
# Recommended posture: keep the console loopback-bound and expose it
# only on host loopback. Operators who need a broader bind can change
# both the published port and the container's --listen address.
#
# Run with `make run` once you've populated ./run/keystore.json and
# ./run/password.

services:
  secure-orch-console:
    image: tztcloud/livepeer-secure-orch-console:dev
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./run:/srv
    command:
      - --keystore=v3:/srv/keystore.json
      - --keystore-password-file=/srv/password
      - --last-signed=/srv/lib/last-signed.json
      - --audit-log=/srv/log/audit.log.jsonl
      - --listen=127.0.0.1:8080
