capability: abr-ladder
description: |
  VOD multi-rendition (ABR ladder) transcode runner. Submits one ladder
  job; runs FFmpeg as a subprocess for each rung; assembles the final
  HLS manifest with all renditions plus the master playlist.

offerings:
  - name: abr-5-rung-default
    description: 5-rung ABR ladder (240p/360p/480p/720p/1080p)
    methods:
      - POST /v1/video/transcode/abr
      - GET /v1/video/transcode/abr/status
      - GET /v1/video/transcode/abr/presets
    rate_card_hints:
      unit: output_seconds
      cost_basis: sum of rendition output durations

presets:
  source: presets.yaml (embedded via go:embed; override with PRESETS_YAML_PATH)
