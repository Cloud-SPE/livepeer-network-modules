# Run-only compose for video-runners. Build via
# `./infra/scripts/build-images.sh transcode-runner abr-runner
#                                  transcode-runner-nvidia abr-runner-nvidia
#                                  transcode-runner-intel abr-runner-intel`.
#
# The default profile (no `--profile`) runs the AMD-target runners since
# they don't need vendor-specific drivers. Use `--profile nvidia` for
# CUDA hosts (requires `runtime: nvidia` and the nvidia container
# toolkit) or `--profile intel` for QSV/VAAPI Intel hosts.
#
# `--profile storage` brings up RustFS for VOD output staging.

services:
  # ---- AMD VAAPI (default profile — works on most Linux hosts) ----
  transcode_runner:
    image: ${REGISTRY:-tztcloud}/transcode-runner:${TAG:-v1.1.0}
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - transcode-temp:/tmp/transcode
    ports:
      - "${TRANSCODE_RUNNER_PORT:-8086}:8080"

  abr_runner:
    image: ${REGISTRY:-tztcloud}/abr-runner:${TAG:-v1.1.0}
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - abr-temp:/tmp/abr
    ports:
      - "${ABR_RUNNER_PORT:-8087}:8080"

  # ---- NVIDIA NVENC/NVDEC (profile: nvidia) ----
  transcode_runner_nvidia:
    image: ${REGISTRY:-tztcloud}/transcode-runner-nvidia:${TAG:-v1.1.0}
    profiles: [nvidia]
    runtime: nvidia
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - transcode-temp:/tmp/transcode
    ports:
      - "${TRANSCODE_RUNNER_PORT:-8086}:8080"

  abr_runner_nvidia:
    image: ${REGISTRY:-tztcloud}/abr-runner-nvidia:${TAG:-v1.1.0}
    profiles: [nvidia]
    runtime: nvidia
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - abr-temp:/tmp/abr
    ports:
      - "${ABR_RUNNER_PORT:-8087}:8080"

  # ---- Intel QSV / VAAPI (profile: intel) ----
  transcode_runner_intel:
    image: ${REGISTRY:-tztcloud}/transcode-runner-intel:${TAG:-v1.1.0}
    profiles: [intel]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - transcode-temp:/tmp/transcode

  abr_runner_intel:
    image: ${REGISTRY:-tztcloud}/abr-runner-intel:${TAG:-v1.1.0}
    profiles: [intel]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - abr-temp:/tmp/abr

  # ---- Optional RustFS for VOD output (profile: storage) ----
  rustfs:
    image: rustfs/rustfs:latest
    profiles: [storage]
    command:
      - serve
      - /data
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER:-rustfsadmin}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD:-rustfsadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs_init:
    image: amazon/aws-cli:latest
    profiles: [storage]
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ROOT_USER:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_ROOT_PASSWORD:-rustfsadmin}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - >
        aws --endpoint-url http://rustfs:9000 s3api create-bucket
        --bucket transcoded 2>/dev/null || true

volumes:
  transcode-temp: {}
  abr-temp: {}
  rustfs-data: {}
