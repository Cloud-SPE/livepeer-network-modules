# Run-only compose for video-runners. Build via
# `./infra/scripts/build-images.sh transcode-runner abr-runner
#                                  transcode-runner-nvidia abr-runner-nvidia
#                                  transcode-runner-intel abr-runner-intel`.
#
# The default profile (no `--profile`) runs the AMD-target runners since
# they don't need vendor-specific drivers. Use `--profile nvidia` for
# CUDA hosts (requires `runtime: nvidia` and the nvidia container
# toolkit) or `--profile intel` for QSV/VAAPI Intel hosts.
#
# `--profile storage` brings up MinIO for VOD output staging.

services:
  # ---- AMD VAAPI (default profile — works on most Linux hosts) ----
  transcode_runner:
    image: ${REGISTRY:-tztcloud}/transcode-runner:${TAG:-v1.0.0}
    devices:
      - /dev/dri:/dev/dri
    environment:
      - CAPABILITY_NAME=transcode-vod
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - transcode-temp:/tmp/transcode
    ports:
      - "${TRANSCODE_RUNNER_PORT:-8086}:8080"

  abr_runner:
    image: ${REGISTRY:-tztcloud}/abr-runner:${TAG:-v1.0.0}
    devices:
      - /dev/dri:/dev/dri
    environment:
      - CAPABILITY_NAME=abr-ladder
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - abr-temp:/tmp/abr
    ports:
      - "${ABR_RUNNER_PORT:-8087}:8080"

  # ---- NVIDIA NVENC/NVDEC (profile: nvidia) ----
  transcode_runner_nvidia:
    image: ${REGISTRY:-tztcloud}/transcode-runner-nvidia:${TAG:-v1.0.0}
    profiles: [nvidia]
    runtime: nvidia
    environment:
      - CAPABILITY_NAME=transcode-vod
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - transcode-temp:/tmp/transcode
    ports:
      - "${TRANSCODE_RUNNER_PORT:-8086}:8080"

  abr_runner_nvidia:
    image: ${REGISTRY:-tztcloud}/abr-runner-nvidia:${TAG:-v1.0.0}
    profiles: [nvidia]
    runtime: nvidia
    environment:
      - CAPABILITY_NAME=abr-ladder
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - abr-temp:/tmp/abr
    ports:
      - "${ABR_RUNNER_PORT:-8087}:8080"

  # ---- Intel QSV / VAAPI (profile: intel) ----
  transcode_runner_intel:
    image: ${REGISTRY:-tztcloud}/transcode-runner-intel:${TAG:-v1.0.0}
    profiles: [intel]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - CAPABILITY_NAME=transcode-vod
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - transcode-temp:/tmp/transcode

  abr_runner_intel:
    image: ${REGISTRY:-tztcloud}/abr-runner-intel:${TAG:-v1.0.0}
    profiles: [intel]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - CAPABILITY_NAME=abr-ladder
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - METRICS_ENABLED=false
    volumes:
      - abr-temp:/tmp/abr

  # ---- Optional MinIO for VOD output (profile: storage) ----
  minio:
    image: minio/minio:latest
    profiles: [storage]
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio4dmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio4dmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio_init:
    image: minio/mc:latest
    profiles: [storage]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio4dmin} ${MINIO_ROOT_PASSWORD:-minio4dmin} &&
      mc mb --ignore-existing local/transcoded &&
      mc anonymous set public local/transcoded
      "

volumes:
  transcode-temp: {}
  abr-temp: {}
  minio-data: {}
