capability: transcode-vod
description: |
  VOD single-rendition transcode runner. Submits a transcode job over
  HTTP, runs FFmpeg as a subprocess with the requested preset (NVENC /
  QSV / VAAPI / x264), polls for completion, and returns the output
  manifest.

offerings:
  - name: vod-single-rendition
    description: VOD single-output transcode (one preset per request)
    methods:
      - POST /v1/video/transcode
      - GET /v1/video/transcode/status
      - GET /v1/video/transcode/presets
    rate_card_hints:
      unit: output_seconds
      cost_basis: output duration in seconds (per ffprobe)

presets:
  source: presets.yaml (embedded via go:embed; override with PRESETS_YAML_PATH)
