# Full smoke stack for vtuber-gateway end-to-end.
#
# Topology mirrors openai-gateway/compose.smoke.yaml shape:
#   postgres        — vtuber.* schema + app.* (customer-portal) schema
#   payment-daemon  — receiver-side gRPC sidecar
#   payer-daemon    — sender-side gRPC sidecar (gateway dials this)
#   broker          — capability-broker session-control-plus-media driver
#   vtuber-runner   — Python session-runtime + headless Chromium
#                     (workload binary running on the orch host)
#   gateway         — vtuber-gateway TS Fastify service
#
# Default image tags use v1.0.0 for the smoke stack.

services:
  postgres:
    image: postgres:16-alpine
    networks: [vtuber-stack]
    expose:
      - "5432"
    environment:
      POSTGRES_USER: vtuber
      POSTGRES_PASSWORD: vtuber
      POSTGRES_DB: vtuber_gateway
    volumes:
      - vtuber-pg:/var/lib/postgresql/data

  payment-daemon:
    image: tztcloud/livepeer-payment-daemon:v1.0.0
    networks: [vtuber-stack]
    volumes:
      - livepeer-payment:/var/run/livepeer
      - livepeer-payment-data:/var/lib/livepeer/payment-daemon
    command:
      - --mode=receiver
      - --socket=/var/run/livepeer/payment-daemon.sock
      - --db=/var/lib/livepeer/payment-daemon/sessions.db

  payer-daemon:
    image: tztcloud/livepeer-payment-daemon:v1.0.0
    networks: [vtuber-stack]
    volumes:
      - livepeer-payment:/var/run/livepeer
    command:
      - --mode=sender
      - --socket=/var/run/livepeer/payer-daemon.sock

  broker:
    image: tztcloud/livepeer-capability-broker:v1.0.0
    depends_on: [payment-daemon, vtuber-runner]
    networks: [vtuber-stack]
    volumes:
      - ./compose-broker-config.yaml:/etc/livepeer/host-config.yaml:ro
      - livepeer-payment:/var/run/livepeer
    expose:
      - "8080"
    command:
      - --config=/etc/livepeer/host-config.yaml
      - --listen=:8080

  vtuber-runner:
    image: tztcloud/livepeer-vtuber-runner:dev
    networks: [vtuber-stack]
    expose:
      - "8080"
    environment:
      SESSION_RUNNER_HTTP_PORT: "8080"
      LIVEPEER_OPENAI_GATEWAY_URL: "http://openai-gateway:3000"
      LIVEPEER_OPENAI_GATEWAY_API_KEY: "${LIVEPEER_OPENAI_GATEWAY_API_KEY:-replace-me}"
      TRICKLE_PUBLISH_URL: "http://broker:8080/trickle"
      WORKER_CONTROL_BEARER_PUBKEY: "${VTUBER_WORKER_CONTROL_BEARER_PEPPER:-please-override-pepper-min-16-chars}"

  gateway:
    image: tztcloud/livepeer-vtuber-gateway:dev
    depends_on: [postgres, broker, payer-daemon]
    networks: [vtuber-stack]
    volumes:
      - livepeer-payment:/var/run/livepeer
    ports:
      - "3001:3001"
    environment:
      LIVEPEER_BROKER_URL: "http://broker:8080"
      LIVEPEER_PAYER_DAEMON_SOCKET: "/var/run/livepeer/payer-daemon.sock"
      LIVEPEER_PAYER_DEFAULT_FACE_VALUE_WEI: "1000000000000000"
      VTUBER_DEFAULT_OFFERING: "default"
      VTUBER_RATE_CARD_USD_PER_SECOND: "0.01"
      VTUBER_SESSION_BEARER_PEPPER: "${VTUBER_SESSION_BEARER_PEPPER:-please-override-pepper-min-16-chars}"
      VTUBER_WORKER_CONTROL_BEARER_PEPPER: "${VTUBER_WORKER_CONTROL_BEARER_PEPPER:-please-override-pepper-min-16-chars}"
      DATABASE_URL: "postgres://vtuber:vtuber@postgres:5432/vtuber_gateway"
      PORT: "3001"

networks:
  vtuber-stack:
    driver: bridge

volumes:
  vtuber-pg: {}
  livepeer-payment: {}
  livepeer-payment-data: {}
